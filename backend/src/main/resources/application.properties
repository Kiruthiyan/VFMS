spring.application.name=vfms-backend
server.port=8080
server.servlet.context-path=/

# Load environment files (local + optional backend fallback)
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# ===============================
# DATABASE (Supabase PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vfms_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.separator=@@

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.out-of-order=true

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=${JWT_SECRET:replace-with-a-strong-32-char-plus-secret}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# FRONTEND URL
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ===============================
# SUPABASE STORAGE
# ===============================
supabase.storage.url=${SUPABASE_STORAGE_URL:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:fuel-receipts}
supabase.storage.service-key=${SUPABASE_SERVICE_KEY:}

# ===============================
# VEHICLE API INTEGRATION
# ===============================
app.vehicle.api.base-url=${VEHICLE_API_BASE_URL:http://localhost:8080/api/vehicles}

# ===============================
# FUEL MISUSE RULES
# ===============================
fuel.misuse.max-litres-per-entry=100
fuel.misuse.max-entries-per-day=3

# ===============================
# LOGGING
# ===============================
logging.level.com.vfms=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# ===============================
# USER MANAGEMENT
# ===============================
vfms.user.temp-password.length=${VFMS_TEMP_PASSWORD_LENGTH:10}
vfms.user.temp-password.chars=${VFMS_TEMP_PASSWORD_CHARS:ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%}

# ===============================
# ADMIN SEED (first-run bootstrap)
# Override via env vars - never hardcode in production
# ===============================
vfms.admin.seed.enabled=${ADMIN_SEED_ENABLED:false}
vfms.admin.seed.email=${ADMIN_SEED_EMAIL:}
vfms.admin.seed.password=${ADMIN_SEED_PASSWORD:}
vfms.admin.seed.full-name=${ADMIN_SEED_FULL_NAME:}
vfms.admin.seed.phone=${ADMIN_SEED_PHONE:}
vfms.admin.seed.nic=${ADMIN_SEED_NIC:}

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
app.upload.dir=uploads/documents