# ===============================
# DATABASE (Supabase PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vfms_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=${JWT_SECRET:replace-with-a-strong-32-char-plus-secret-for-dev-only}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# FRONTEND URL (for email links)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ===============================
# SUPABASE STORAGE
# ===============================
supabase.storage.url=${SUPABASE_STORAGE_URL:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:fuel-receipts}
supabase.storage.service-key=${SUPABASE_SERVICE_KEY:}

# ===============================
# VEHICLE API INTEGRATION (Real-time data fetching)
# ===============================
app.vehicle.api.base-url=${VEHICLE_API_BASE_URL:http://localhost:8080/api/vehicles}

# ===============================
# FUEL MISUSE THRESHOLDS
# ===============================
fuel.misuse.max-litres-per-entry=100
fuel.misuse.max-entries-per-day=3

# ===============================
# LOGGING
# ===============================
logging.level.com.vfms=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# ===============================
# USER MANAGEMENT (Admin-created temp password policy)
# ===============================
# Safe defaults are provided in code; override via environment if needed.
vfms.user.temp-password.length=${VFMS_TEMP_PASSWORD_LENGTH:10}
vfms.user.temp-password.chars=${VFMS_TEMP_PASSWORD_CHARS:ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%}