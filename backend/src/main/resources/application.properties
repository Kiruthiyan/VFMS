spring.application.name=vfms-backend
server.port=8080
server.servlet.context-path=/

# ===============================
# DATABASE (Supabase PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://db.bbfnkmzqftuvwesnmjkj.supabase.co:5432/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=kiruthiyan1234

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.out-of-order=true

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002

# ===============================
# EMAIL CONFIGURATION (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:kiruthiyan7@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ===============================
# FRONTEND URL (for email links)
# ===============================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# LOGGING
# ===============================
logging.level.com.vfms=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO