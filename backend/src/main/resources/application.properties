spring.application.name=vfms-backend
server.port=8080

# Database Configuration - H2 (Development)
# For PostgreSQL Supabase: jdbc:postgresql://db.bbfnkmzqftuvwesnmjkj.supabase.co:5432/postgres?sslmode=require
spring.datasource.url=jdbc:h2:file:./data/vfmsdb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# CORS Configuration
server.servlet.context-path=/
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002

# Email Configuration (Gmail SMTP)
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:kiruthiyan7@gmail.com}
spring.mail.password=${MAIL_PASSWORD:diixanavjeuxjllk}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Logging
logging.level.com.vfms=INFO
logging.level.org.springframework.security=INFO
