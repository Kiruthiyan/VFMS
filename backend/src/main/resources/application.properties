spring.application.name=vfms-backend
server.port=8080
server.servlet.context-path=/

# Local development uses the dev profile (see application-dev.properties).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# DATABASE (env-driven — set in backend/.env)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ===============================
# JPA / HIBERNATE (safe defaults; dev profile overrides for local work)
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# JWT CONFIGURATION
# ===============================
application.security.jwt.secret-key=${JWT_SECRET:replace-with-a-strong-32-char-plus-secret}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===============================
# CORS / FRONTEND
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ===============================
# LOGGING (production-safe defaults)
# ===============================
logging.level.com.vfms=INFO
logging.level.org.springframework.security=INFO
